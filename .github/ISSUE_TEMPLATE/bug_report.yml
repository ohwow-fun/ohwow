name: Bug Report
description: Something isn't working as expected
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
      value: |
        1.
        2.
        3.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
  - type: input
    id: system
    attributes:
      label: System info
      description: "OS, Node version, ohwow version (run: ohwow --version)"
      placeholder: "macOS 15.3, Node 22.5, ohwow 0.2.0"
  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Paste any relevant log output here.
      render: shell
